services:
  # 1. Die PostgreSQL Datenbank (Läuft stabil)
  database:
    image: postgres:16-alpine
    container_name: inventar_db
    environment:
      POSTGRES_DB: ${DOCKER_POSTGRES_DB}
      POSTGRES_USER: ${DOCKER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DOCKER_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  # 2. PHP-FPM (Baut jetzt sauber über das Dockerfile)
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: inventar_php
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html

  # 3. Nginx Webserver (Bleibt genau so)
  web:
    image: nginx:alpine
    container_name: inventar_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - database

volumes:
  db_data:
